name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npx turbo run build --filter=staleflags-core --filter=staleflags

      - name: Unit tests
        run: npx turbo run test --filter=staleflags-core

      - name: Type check
        run: npx turbo run lint --filter=staleflags-core --filter=staleflags

  self-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npx turbo run build --filter=staleflags-core && npx turbo run build --filter=staleflags

      - name: Scan staleflags' own codebase
        run: node packages/cli/dist/bin.js --fail-on dead
